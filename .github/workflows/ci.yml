name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4
        with:
          args: check
      - uses: astral-sh/ruff-action@v4
        with:
          args: format --check

  test-parser:
    name: "Tests: parser (ubuntu)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Run parser tests
        run: pytest test_generate.py -v -k "TestParseFile"

  test-audio:
    name: "Tests: full suite (macOS)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pytest
          brew install ffmpeg
      - name: Run all tests
        run: pytest test_generate.py -v
