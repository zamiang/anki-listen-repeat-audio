name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request against the guidance in CLAUDE.md. Focus on:
            - Correctness of the audio pipeline (sample rate invariant, concat ordering, cleanup of intermediate files)
            - Test coverage for any new behavior
            - Lint/format compliance with the project's ruff config
            - Accuracy of any documentation changes against the actual code

            Post findings as review comments. Skip nitpicks; call out real issues.
          claude_args: "--max-turns 20"
